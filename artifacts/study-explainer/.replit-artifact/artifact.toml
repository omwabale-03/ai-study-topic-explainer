kind = "web"
previewPath = "/"
title = "AI Study Topic Explainer"
version = "1.0.0"
id = "artifacts/study-explainer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 26045
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/study-explainer run dev"

[services.env]
PORT = "26045"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/study-explainer", "run", "build"]
publicDir = "artifacts/study-explainer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
