openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: explain
    description: AI topic explanation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /explain:
    post:
      operationId: explainTopic
      tags: [explain]
      summary: Explain a study topic
      description: Generates a simple AI explanation of a study topic for students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExplainTopicBody"
      responses:
        "200":
          description: Explanation generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExplainTopicResponse"
        "400":
          description: Bad request - missing or empty topic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ExplainTopicBody:
      type: object
      properties:
        topic:
          type: string
          description: The study topic to explain
      required:
        - topic
    ExplainTopicResponse:
      type: object
      properties:
        explanation:
          type: string
          description: The AI-generated explanation of the topic
      required:
        - explanation
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
